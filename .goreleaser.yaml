version: 2

release:
  # If set to auto, will mark the release as not ready for production
  # in case there is an indicator for this in the tag e.g. v1.0.0-rc1
  # If set to true, will mark the release as not ready for production.
  prerelease: auto

builds:
  - binary: anchore-k8s-inventory
    id: generic
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Set the modified timestamp on the output binary to the git timestamp (to ensure a reproducible build)
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags: |
      -w
      -s
      -extldflags '-static'
      -X github.com/anchore/k8s-inventory/internal/version.version={{.Version}}
      -X github.com/anchore/k8s-inventory/internal/version.gitCommit={{.Commit}}
      -X github.com/anchore/k8s-inventory/internal/version.buildDate={{.Date}}
      -X github.com/anchore/k8s-inventory/internal/version.gitTreeState={{.Env.BUILD_GIT_TREE_STATE}}
  - binary: anchore-k8s-inventory
    id: fips
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=boringcrypto
    goos:
      - linux
    goarch:
      - amd64
    # Set the modified timestamp on the output binary to the git timestamp (to ensure a reproducible build)
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags: |
      -w
      -linkmode=external
      -extldflags '-static'
      -X github.com/anchore/k8s-inventory/internal/version.version={{.Version}}
      -X github.com/anchore/k8s-inventory/internal/version.gitCommit={{.Commit}}
      -X github.com/anchore/k8s-inventory/internal/version.buildDate={{.Date}}
      -X github.com/anchore/k8s-inventory/internal/version.gitTreeState={{.Env.BUILD_GIT_TREE_STATE}}

archives:
  - id: archive-generic
    formats: [ 'tar.gz' ]
    ids:
      - generic
    name_template: 'anchore-k8s-inventory_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'
  - id: archive-fips
    formats: [ 'tar.gz' ]
    ids:
      - fips
    name_template: 'anchore-k8s-inventory-fips_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

dockers:
  # Generic amd64 image — always pushed (incl. prereleases); building block for the generic
  # multi-arch manifests below.
  - image_templates:
      - "anchore/k8s-inventory:{{ .Tag }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    ids:
      - generic
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--provenance=false"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"

  # Generic arm64 image — always pushed (incl. prereleases).
  - image_templates:
      - "anchore/k8s-inventory:{{ .Tag }}-arm64v8"
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    ids:
      - generic
    build_flag_templates:
      - "--platform=linux/arm64/v8"
      - "--provenance=false"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"

  # FIPS image (amd64 only — boringcrypto has no arm64 target). skip_push: auto publishes the
  # whole FIPS line on final releases and skips it on prereleases. All names point at the same
  # image; :{Tag}-fips-amd64 is kept for back-compat.
  - image_templates:
      - "anchore/k8s-inventory:latest-fips"
      - "anchore/k8s-inventory:v{{ .Major }}-fips"
      - "anchore/k8s-inventory:v{{ .Major }}.{{ .Minor }}-fips"
      - "anchore/k8s-inventory:{{ .Tag }}-fips"
      - "anchore/k8s-inventory:{{ .Tag }}-fips-amd64"
    dockerfile: Dockerfile
    use: buildx
    ids:
      - fips
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--provenance=false"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--build-arg=BUILD_VERSION={{.Version}}"
      - "--build-arg=VCS_REF={{.FullCommit}}"
      - "--build-arg=VCS_URL={{.GitURL}}"
    skip_push: auto

docker_manifests:
  # Generic multi-arch manifests (amd64 + arm64), all built from the per-tag arch images above.
  # :{Tag} omits skip_push so prereleases get a pullable multi-arch tag; latest / major / minor
  # use skip_push: auto so a prerelease never moves them.
  - name_template: anchore/k8s-inventory:{{ .Tag }}
    image_templates:
      - anchore/k8s-inventory:{{ .Tag }}-amd64
      - anchore/k8s-inventory:{{ .Tag }}-arm64v8
  - name_template: anchore/k8s-inventory:latest
    image_templates:
      - anchore/k8s-inventory:{{ .Tag }}-amd64
      - anchore/k8s-inventory:{{ .Tag }}-arm64v8
    skip_push: auto
  - name_template: anchore/k8s-inventory:v{{ .Major }}
    image_templates:
      - anchore/k8s-inventory:{{ .Tag }}-amd64
      - anchore/k8s-inventory:{{ .Tag }}-arm64v8
    skip_push: auto
  - name_template: anchore/k8s-inventory:v{{ .Major }}.{{ .Minor }}
    image_templates:
      - anchore/k8s-inventory:{{ .Tag }}-amd64
      - anchore/k8s-inventory:{{ .Tag }}-arm64v8
    skip_push: auto
      
